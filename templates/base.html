<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BOM Builder{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="{{ url_for('need_page') }}">BOM Builder</a>
            <nav class="main-nav">
                <a href="{{ url_for('need_page') }}" class="{% if request.endpoint == 'need_page' %}active{% endif %}">Need</a>
                <a href="{{ url_for('inventory_page') }}" class="{% if request.endpoint == 'inventory_page' %}active{% endif %}">Inventory</a>
                <a href="{{ url_for('compare_page') }}" class="{% if request.endpoint == 'compare_page' %}active{% endif %}">Compare</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>Phase 1 — foundation</span>
        {% if bom_ids %}
        <span class="footer-meta">{{ bom_ids|length }} BOM(s) loaded</span>
        {% endif %}
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
